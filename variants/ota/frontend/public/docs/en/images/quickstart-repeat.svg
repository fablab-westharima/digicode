<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 160">
  <defs>
    <linearGradient id="stepGradR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowR" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="650" height="160" fill="#0D1117" rx="12"/>
  <text x="325" y="28" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="16">After Initial Setup (~1 min)</text>

  <g transform="translate(40, 45)">
    <rect width="170" height="100" rx="12" fill="url(#stepGradR)" filter="url(#shadowR)"/>
    <text x="85" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">STEP 1</text>
    <text x="85" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">Create Program</text>
    <g transform="translate(65, 65)">
      <rect x="0" y="0" width="12" height="10" rx="2" fill="white" opacity="0.8"/>
      <rect x="15" y="0" width="18" height="10" rx="2" fill="white" opacity="0.8"/>
    </g>
  </g>

  <polygon points="220,95 235,95 235,90 250,97 235,104 235,99 220,99" fill="#86efac"/>

  <g transform="translate(240, 45)">
    <rect width="170" height="100" rx="12" fill="url(#stepGradR)" filter="url(#shadowR)"/>
    <text x="85" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">STEP 2</text>
    <text x="85" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">Click Upload</text>
    <polygon points="77,72 77,82 87,77" fill="white" opacity="0.8"/>
  </g>

  <polygon points="420,95 435,95 435,90 450,97 435,104 435,99 420,99" fill="#86efac"/>

  <g transform="translate(440, 45)">
    <rect width="170" height="100" rx="12" fill="url(#stepGradR)" filter="url(#shadowR)"/>
    <text x="85" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">STEP 3</text>
    <text x="85" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Run!</text>
    <g transform="translate(70, 62)">
      <circle cx="15" cy="12" r="12" fill="white" opacity="0.3"/>
      <path d="M9 12 L13 16 L21 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
