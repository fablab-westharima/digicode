<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#0D1117" rx="12"/>

  <!-- Step 1 -->
  <g transform="translate(50, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 1</text>
    <text x="70" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15">Preparation</text>
    <text x="70" y="85" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">ESP32 Board</text>
    <text x="70" y="100" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">USB Cable</text>
  </g>

  <polygon points="200,100 215,100 215,95 230,102 215,109 215,104 200,104" fill="#5eead4"/>

  <!-- Step 2 -->
  <g transform="translate(250, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 2</text>
    <text x="70" y="58" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Firmware</text>
    <text x="70" y="76" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Upload</text>
    <text x="70" y="100" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="11">Initial only</text>
  </g>

  <polygon points="400,100 415,100 415,95 430,102 415,109 415,104 400,104" fill="#5eead4"/>

  <!-- Step 3 -->
  <g transform="translate(450, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 3</text>
    <text x="70" y="58" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Connection</text>
    <text x="70" y="76" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Setup</text>
    <text x="70" y="100" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">WiFi / BLE</text>
  </g>

  <polygon points="600,100 615,100 615,95 630,102 615,109 615,104 600,104" fill="#5eead4"/>

  <!-- Step 4 -->
  <g transform="translate(650, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 4</text>
    <text x="70" y="58" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Program</text>
    <text x="70" y="76" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Upload</text>
    <text x="70" y="100" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="11">Anytime</text>
  </g>
</svg>
