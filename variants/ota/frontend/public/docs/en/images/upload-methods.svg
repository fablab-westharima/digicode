<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="usbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="320" fill="#0D1117" rx="12"/>

  <text x="400" y="35" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="18">Which method to use?</text>

  <!-- WiFi OTA -->
  <g transform="translate(50, 60)">
    <rect width="220" height="240" rx="16" fill="#161B22" stroke="#14b8a6" stroke-width="2" filter="url(#shadow2)"/>
    <rect width="220" height="50" rx="16" fill="url(#wifiGrad)"/>
    <rect x="0" y="34" width="220" height="16" fill="url(#wifiGrad)"/>
    <g transform="translate(30, 25)">
      <path d="M0 8 Q10 -2 20 8" stroke="white" stroke-width="2" fill="none"/>
      <path d="M3 12 Q10 5 17 12" stroke="white" stroke-width="2" fill="none"/>
      <circle cx="10" cy="16" r="2" fill="white"/>
    </g>
    <text x="110" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">WiFi OTA</text>
    <rect x="60" y="42" width="100" height="20" rx="10" fill="#fcd34d"/>
    <text x="110" y="56" text-anchor="middle" fill="#0D1117" font-family="sans-serif" font-weight="bold" font-size="11">Recommended</text>
    <text x="110" y="95" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Fastest</text>
    <text x="110" y="120" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ No cable needed</text>
    <text x="110" y="145" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Batch updates</text>
    <line x1="20" y1="165" x2="200" y2="165" stroke="#2E333D" stroke-width="1"/>
    <text x="110" y="190" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="12">Requirements:</text>
    <text x="110" y="210" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">WiFi Router</text>
    <text x="110" y="228" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">DigiCode Finder</text>
  </g>

  <!-- BLE -->
  <g transform="translate(290, 60)">
    <rect width="220" height="240" rx="16" fill="#161B22" stroke="#3b82f6" stroke-width="2" filter="url(#shadow2)"/>
    <rect width="220" height="50" rx="16" fill="url(#bleGrad)"/>
    <rect x="0" y="34" width="220" height="16" fill="url(#bleGrad)"/>
    <g transform="translate(35, 18)">
      <path d="M10 0 L10 32 L20 22 L5 10 L20 10 L5 22 L10 32" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
    </g>
    <text x="110" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">BLE</text>
    <text x="110" y="95" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ No WiFi needed</text>
    <text x="110" y="120" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ No cable needed</text>
    <text x="110" y="145" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Works anywhere</text>
    <line x1="20" y1="165" x2="200" y2="165" stroke="#2E333D" stroke-width="1"/>
    <text x="110" y="190" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="12">Requirements:</text>
    <text x="110" y="210" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">Chrome / Edge</text>
    <text x="110" y="228" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">(Web Bluetooth)</text>
  </g>

  <!-- USB -->
  <g transform="translate(530, 60)">
    <rect width="220" height="240" rx="16" fill="#161B22" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow2)"/>
    <rect width="220" height="50" rx="16" fill="url(#usbGrad)"/>
    <rect x="0" y="34" width="220" height="16" fill="url(#usbGrad)"/>
    <g transform="translate(32, 18)">
      <rect x="5" y="8" width="10" height="16" rx="2" stroke="white" stroke-width="2" fill="none"/>
      <line x1="10" y1="0" x2="10" y2="8" stroke="white" stroke-width="2"/>
      <line x1="10" y1="24" x2="10" y2="32" stroke="white" stroke-width="2"/>
    </g>
    <text x="110" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">USB</text>
    <text x="110" y="95" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Most reliable</text>
    <text x="110" y="120" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Required for setup</text>
    <text x="110" y="145" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="13">✓ Works everywhere</text>
    <line x1="20" y1="165" x2="200" y2="165" stroke="#2E333D" stroke-width="1"/>
    <text x="110" y="190" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="12">Requirements:</text>
    <text x="110" y="210" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">USB Cable</text>
    <text x="110" y="228" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">Drivers</text>
  </g>
</svg>
