<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">
  <defs>
    <linearGradient id="finderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowO" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="700" height="220" fill="#0D1117" rx="12"/>

  <text x="350" y="28" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="15">WiFi OTA 更新流程</text>

  <g transform="translate(30, 50)">
    <rect width="130" height="50" rx="10" fill="url(#finderGrad)" filter="url(#shadowO)"/>
    <text x="65" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">DigiCode Finder</text>
    <text x="65" y="40" text-anchor="middle" fill="#ddd6fe" font-family="sans-serif" font-size="10">（桌面應用）</text>
  </g>
  <polygon points="165,75 178,75 178,71 190,78 178,85 178,81 165,81" fill="#c4b5fd"/>
  <text x="165" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">mDNS 探索</text>

  <g transform="translate(195, 50)">
    <rect width="110" height="50" rx="10" fill="#22c55e" filter="url(#shadowO)"/>
    <text x="55" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="12">ESP32</text>
    <text x="55" y="40" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="10">裝置</text>
  </g>
  <polygon points="310,75 323,75 323,71 335,78 323,85 323,81 310,81" fill="#86efac"/>
  <text x="310" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">裝置資訊</text>

  <g transform="translate(340, 50)">
    <rect width="130" height="50" rx="10" fill="url(#finderGrad)" filter="url(#shadowO)"/>
    <text x="65" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">DigiCode Finder</text>
    <text x="65" y="40" text-anchor="middle" fill="#ddd6fe" font-family="sans-serif" font-size="10">（裝置清單）</text>
  </g>
  <polygon points="475,75 488,75 488,71 500,78 488,85 488,81 475,81" fill="#c4b5fd"/>
  <text x="475" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">選擇 IP</text>

  <g transform="translate(505, 50)">
    <rect width="130" height="50" rx="10" fill="#14b8a6" filter="url(#shadowO)"/>
    <text x="65" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">前端</text>
    <text x="65" y="40" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="10">（裝置選擇）</text>
  </g>

  <path d="M570 100 L570 130" stroke="#5eead4" stroke-width="2" fill="none"/>
  <polygon points="565,130 570,145 575,130" fill="#5eead4"/>
  <text x="585" y="125" fill="#8B949E" font-family="sans-serif" font-size="9">.bin</text>

  <g transform="translate(505, 150)">
    <rect width="130" height="50" rx="10" fill="#22c55e" filter="url(#shadowO)"/>
    <text x="65" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">ESP32</text>
    <text x="65" y="40" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="10">(/doUpdate)</text>
  </g>
  <polygon points="500,175 487,175 487,171 475,178 487,185 487,181 500,181" fill="#86efac"/>
  <text x="410" y="168" fill="#8B949E" font-family="sans-serif" font-size="9">更新韌體</text>

  <g transform="translate(340, 150)">
    <rect width="130" height="50" rx="10" fill="#22c55e" filter="url(#shadowO)"/>
    <text x="65" y="25" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="12">ESP32 重啟</text>
    <text x="65" y="40" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="10">新程式</text>
  </g>

  <g transform="translate(280, 160)">
    <circle cx="20" cy="20" r="18" fill="#22c55e" opacity="0.3"/>
    <path d="M12 20 L18 26 L28 14" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
