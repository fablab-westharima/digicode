<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="stepGradGS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowGS" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="#0D1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="18">DigiCode セットアップ 4ステップ</text>

  <!-- Step 1 -->
  <g transform="translate(50, 55)">
    <rect width="160" height="200" rx="12" fill="#161B22" stroke="#14b8a6" stroke-width="2" filter="url(#shadowGS)"/>
    <circle cx="80" cy="35" r="22" fill="url(#stepGradGS)"/>
    <text x="80" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">1</text>
    <text x="80" y="80" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="14">アカウント作成</text>

    <!-- Icon: User -->
    <g transform="translate(55, 100)">
      <circle cx="25" cy="15" r="12" fill="none" stroke="#5eead4" stroke-width="2"/>
      <path d="M5 45 Q25 30 45 45" fill="none" stroke="#5eead4" stroke-width="2"/>
    </g>

    <text x="80" y="165" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">新規登録</text>
    <text x="80" y="180" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">→ ログイン</text>
  </g>

  <!-- Arrow 1 -->
  <polygon points="220,155 235,155 235,148 255,158 235,168 235,161 220,161" fill="#5eead4"/>

  <!-- Step 2 -->
  <g transform="translate(245, 55)">
    <rect width="160" height="200" rx="12" fill="#161B22" stroke="#f59e0b" stroke-width="2" filter="url(#shadowGS)"/>
    <circle cx="80" cy="35" r="22" fill="#f59e0b"/>
    <text x="80" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">2</text>
    <text x="80" y="75" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="13">ファームウェア</text>
    <text x="80" y="92" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="13">書き込み</text>

    <!-- Icon: USB -->
    <g transform="translate(55, 105)">
      <rect x="10" y="5" width="30" height="40" rx="3" fill="none" stroke="#fcd34d" stroke-width="2"/>
      <rect x="18" y="0" width="14" height="8" rx="2" fill="#fcd34d"/>
      <line x1="20" y1="20" x2="30" y2="20" stroke="#fcd34d" stroke-width="2"/>
      <line x1="20" y1="30" x2="30" y2="30" stroke="#fcd34d" stroke-width="2"/>
    </g>

    <text x="80" y="165" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">USB接続</text>
    <text x="80" y="180" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="10">初回のみ</text>
  </g>

  <!-- Arrow 2 -->
  <polygon points="415,155 430,155 430,148 450,158 430,168 430,161 415,161" fill="#5eead4"/>

  <!-- Step 3 -->
  <g transform="translate(440, 55)">
    <rect width="160" height="200" rx="12" fill="#161B22" stroke="#3b82f6" stroke-width="2" filter="url(#shadowGS)"/>
    <circle cx="80" cy="35" r="22" fill="#3b82f6"/>
    <text x="80" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">3</text>
    <text x="80" y="80" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="14">プログラム作成</text>

    <!-- Icon: Blocks -->
    <g transform="translate(45, 100)">
      <rect x="0" y="0" width="25" height="18" rx="3" fill="#3b82f6" opacity="0.7"/>
      <rect x="30" y="0" width="35" height="18" rx="3" fill="#60a5fa"/>
      <rect x="10" y="22" width="45" height="18" rx="3" fill="#93c5fd"/>
    </g>

    <text x="80" y="165" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">ブロックを</text>
    <text x="80" y="180" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">組み合わせる</text>
  </g>

  <!-- Arrow 3 -->
  <polygon points="610,155 625,155 625,148 645,158 625,168 625,161 610,161" fill="#5eead4"/>

  <!-- Step 4 -->
  <g transform="translate(635, 55)">
    <rect width="160" height="200" rx="12" fill="#161B22" stroke="#22c55e" stroke-width="2" filter="url(#shadowGS)"/>
    <circle cx="80" cy="35" r="22" fill="#22c55e"/>
    <text x="80" y="42" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">4</text>
    <text x="80" y="80" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="14">書き込み・実行</text>

    <!-- Icon: Play/Check -->
    <g transform="translate(55, 100)">
      <circle cx="25" cy="22" r="20" fill="#22c55e" opacity="0.3"/>
      <polygon points="18,12 18,32 38,22" fill="#22c55e"/>
    </g>

    <text x="80" y="165" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">WiFi OTA</text>
    <text x="80" y="180" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="10">何度でもOK</text>
  </g>
</svg>
