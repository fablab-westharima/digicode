<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0D1117" rx="12"/>

  <!-- Step 1 -->
  <g transform="translate(50, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 1</text>
    <text x="70" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16">準備</text>
    <text x="70" y="85" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">ESP32ボード</text>
    <text x="70" y="100" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">USBケーブル</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M200 100 L230 100" stroke="#5eead4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="230,95 245,100 230,105" fill="#5eead4"/>

  <!-- Step 2 -->
  <g transform="translate(250, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 2</text>
    <text x="70" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">ファームウェア</text>
    <text x="70" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">書き込み</text>
    <text x="70" y="100" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="11">初回のみ</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M400 100 L430 100" stroke="#5eead4" stroke-width="3" fill="none"/>
  <polygon points="430,95 445,100 430,105" fill="#5eead4"/>

  <!-- Step 3 -->
  <g transform="translate(450, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 3</text>
    <text x="70" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16">接続設定</text>
    <text x="70" y="85" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">WiFi / BLE</text>
    <text x="70" y="100" text-anchor="middle" fill="#a5f3fc" font-family="sans-serif" font-size="11">設定</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M600 100 L630 100" stroke="#5eead4" stroke-width="3" fill="none"/>
  <polygon points="630,95 645,100 630,105" fill="#5eead4"/>

  <!-- Step 4 -->
  <g transform="translate(650, 40)">
    <rect width="140" height="120" rx="12" fill="url(#stepGrad)" filter="url(#shadow)"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="14">STEP 4</text>
    <text x="70" y="60" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">プログラム</text>
    <text x="70" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">書き込み</text>
    <text x="70" y="100" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="11">何度でも</text>
  </g>
</svg>
