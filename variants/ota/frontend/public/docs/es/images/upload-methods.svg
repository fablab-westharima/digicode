<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="usbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="700" height="280" fill="#0D1117" rx="12"/>

  <text x="350" y="35" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="18">Tres Métodos de Carga</text>

  <g transform="translate(30, 60)">
    <rect width="200" height="200" rx="16" fill="url(#wifiGrad)" filter="url(#shadow2)"/>
    <text x="100" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="20">WiFi OTA</text>
    <text x="100" y="65" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="12">★ Recomendado</text>
    <line x1="30" y1="85" x2="170" y2="85" stroke="#bbf7d0" stroke-opacity="0.3" stroke-width="1"/>
    <text x="100" y="110" text-anchor="middle" fill="#dcfce7" font-family="sans-serif" font-size="12">• Sin Cable</text>
    <text x="100" y="130" text-anchor="middle" fill="#dcfce7" font-family="sans-serif" font-size="12">• El Más Rápido</text>
    <text x="100" y="150" text-anchor="middle" fill="#dcfce7" font-family="sans-serif" font-size="12">• Multi-dispositivo</text>
    <text x="100" y="180" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="11">Requiere: Firmware</text>
    <text x="100" y="195" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="11">+ Config WiFi</text>
  </g>

  <g transform="translate(250, 60)">
    <rect width="200" height="200" rx="16" fill="url(#bleGrad)" filter="url(#shadow2)"/>
    <text x="100" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="20">BLE</text>
    <text x="100" y="65" text-anchor="middle" fill="#bfdbfe" font-family="sans-serif" font-size="12">Bluetooth Low Energy</text>
    <line x1="30" y1="85" x2="170" y2="85" stroke="#bfdbfe" stroke-opacity="0.3" stroke-width="1"/>
    <text x="100" y="110" text-anchor="middle" fill="#dbeafe" font-family="sans-serif" font-size="12">• Sin Cable</text>
    <text x="100" y="130" text-anchor="middle" fill="#dbeafe" font-family="sans-serif" font-size="12">• Sin WiFi OK</text>
    <text x="100" y="150" text-anchor="middle" fill="#dbeafe" font-family="sans-serif" font-size="12">• Disp. Cerrados</text>
    <text x="100" y="180" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="11">No ESP32-S2</text>
  </g>

  <g transform="translate(470, 60)">
    <rect width="200" height="200" rx="16" fill="url(#usbGrad)" filter="url(#shadow2)"/>
    <text x="100" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="20">USB</text>
    <text x="100" y="65" text-anchor="middle" fill="#fef3c7" font-family="sans-serif" font-size="12">Conexión Directa</text>
    <line x1="30" y1="85" x2="170" y2="85" stroke="#fef3c7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="100" y="110" text-anchor="middle" fill="#fef9c3" font-family="sans-serif" font-size="12">• Más Confiable</text>
    <text x="100" y="130" text-anchor="middle" fill="#fef9c3" font-family="sans-serif" font-size="12">• Config Inicial</text>
    <text x="100" y="150" text-anchor="middle" fill="#fef9c3" font-family="sans-serif" font-size="12">• Depuración</text>
    <text x="100" y="180" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="11">Requiere: Cable USB</text>
    <text x="100" y="195" text-anchor="middle" fill="#fcd34d" font-family="sans-serif" font-size="11">+ Driver</text>
  </g>
</svg>
