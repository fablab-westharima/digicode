<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <linearGradient id="repeatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowR" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="500" height="150" fill="#0D1117" rx="12"/>

  <text x="250" y="28" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="15">Criação de Programa (Ciclo Repetir)</text>

  <g transform="translate(40, 50)">
    <rect width="120" height="70" rx="12" fill="url(#repeatGrad)" filter="url(#shadowR)"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">1. Criar</text>
    <text x="60" y="52" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="11">Arrastar blocos</text>
  </g>

  <polygon points="165,85 180,85 180,80 195,87 180,94 180,89 165,89" fill="#5eead4"/>

  <g transform="translate(200, 50)">
    <rect width="120" height="70" rx="12" fill="url(#repeatGrad)" filter="url(#shadowR)"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">2. Carregar</text>
    <text x="60" y="52" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="11">WiFi / USB</text>
  </g>

  <polygon points="325,85 340,85 340,80 355,87 340,94 340,89 325,89" fill="#5eead4"/>

  <g transform="translate(360, 50)">
    <rect width="120" height="70" rx="12" fill="url(#repeatGrad)" filter="url(#shadowR)"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="13">3. Verificar</text>
    <text x="60" y="52" text-anchor="middle" fill="#bbf7d0" font-family="sans-serif" font-size="11">Testar robot</text>
  </g>

  <path d="M420 120 Q250 145 100 120" stroke="#5eead4" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="100,115 85,120 100,125" fill="#5eead4"/>
</svg>
