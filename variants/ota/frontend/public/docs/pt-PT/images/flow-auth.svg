<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="authGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowA" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="600" height="200" fill="#0D1117" rx="12"/>

  <text x="300" y="28" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="15">Fluxo de Autenticação</text>

  <g transform="translate(30, 55)">
    <rect width="100" height="45" rx="8" fill="url(#authGrad)" filter="url(#shadowA)"/>
    <text x="50" y="28" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="12">Utilizador</text>
  </g>
  <polygon points="135,77 148,77 148,73 160,80 148,87 148,83 135,83" fill="#818cf8"/>
  <text x="135" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">Iniciar Sessão</text>

  <g transform="translate(165, 55)">
    <rect width="100" height="45" rx="8" fill="#14b8a6" filter="url(#shadowA)"/>
    <text x="50" y="28" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Frontend</text>
  </g>
  <polygon points="270,77 283,77 283,73 295,80 283,87 283,83 270,83" fill="#5eead4"/>
  <text x="260" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">POST /api/auth/login</text>

  <g transform="translate(300, 55)">
    <rect width="100" height="45" rx="8" fill="#f59e0b" filter="url(#shadowA)"/>
    <text x="50" y="22" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Backend</text>
    <text x="50" y="36" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">API</text>
  </g>
  <polygon points="405,77 418,77 418,73 430,80 418,87 418,83 405,83" fill="#fcd34d"/>
  <text x="405" y="105" fill="#8B949E" font-family="sans-serif" font-size="9">Verificar Utilizador</text>

  <g transform="translate(435, 55)">
    <rect width="100" height="45" rx="8" fill="#3b82f6" filter="url(#shadowA)"/>
    <text x="50" y="22" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="11">Cloudflare</text>
    <text x="50" y="36" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">D1</text>
  </g>

  <path d="M485 100 L485 135 L215 135 L215 115" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="210,115 215,100 220,115" fill="#22c55e"/>
  <text x="350" y="150" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="10">Emitir Token JWT → Guardar em localStorage</text>

  <g transform="translate(555, 60)">
    <rect x="5" y="15" width="20" height="16" rx="3" fill="none" stroke="#4ade80" stroke-width="2"/>
    <path d="M10 15 L10 10 Q15 2 20 10 L20 15" fill="none" stroke="#4ade80" stroke-width="2"/>
  </g>
</svg>
