<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowS" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="650" height="180" fill="#0D1117" rx="12"/>

  <text x="325" y="30" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="16">Configuração Inicial (Apenas Primeira Vez)</text>

  <g transform="translate(30, 55)">
    <circle cx="25" cy="25" r="25" fill="url(#stepGrad)" filter="url(#shadowS)"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">1</text>
    <text x="25" y="70" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="11">Carregar</text>
    <text x="25" y="85" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">Firmware</text>
    <text x="25" y="100" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">(USB)</text>
  </g>

  <polygon points="90,80 105,80 105,75 120,82 105,89 105,84 90,84" fill="#5eead4"/>

  <g transform="translate(135, 55)">
    <circle cx="25" cy="25" r="25" fill="url(#stepGrad)" filter="url(#shadowS)"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">2</text>
    <text x="25" y="70" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="11">Configurar</text>
    <text x="25" y="85" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">WiFi</text>
  </g>

  <polygon points="195,80 210,80 210,75 225,82 210,89 210,84 195,84" fill="#5eead4"/>

  <g transform="translate(240, 55)">
    <circle cx="25" cy="25" r="25" fill="url(#stepGrad)" filter="url(#shadowS)"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">3</text>
    <text x="25" y="70" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="11">Instalar</text>
    <text x="25" y="85" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">DigiCode</text>
    <text x="25" y="100" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">Finder</text>
  </g>

  <polygon points="300,80 315,80 315,75 330,82 315,89 315,84 300,84" fill="#5eead4"/>

  <g transform="translate(345, 55)">
    <circle cx="25" cy="25" r="25" fill="#22c55e" filter="url(#shadowS)"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">✓</text>
    <text x="25" y="70" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="11">Pronto!</text>
  </g>

  <g transform="translate(420, 55)">
    <rect width="200" height="100" rx="8" fill="#161B22" stroke="#2E333D" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" fill="#E6EDF3" font-family="sans-serif" font-weight="bold" font-size="12">Depois:</text>
    <text x="100" y="50" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="11">Apenas editar e carregar</text>
    <text x="100" y="70" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="11">via WiFi OTA</text>
    <text x="100" y="90" text-anchor="middle" fill="#8B949E" font-family="sans-serif" font-size="10">(Sem cabo necessário)</text>
  </g>
</svg>
